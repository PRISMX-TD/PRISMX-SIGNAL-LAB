<!doctype html>
<html lang="zh">
  <head>
    <meta charset="UTF-8" />
    <!-- 声明深色配色，让 Google 登录（GSI/FedCM）个性化按钮渲染为深色而非白底 / dark scheme so the GSI personalized button renders dark, not white -->
    <meta name="color-scheme" content="dark" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, minimum-scale=1.0, user-scalable=no" />
    <link rel="icon" type="image/png" href="/icons/favicon-48.png" />
    <!-- PWA manifest（display: standalone）。iOS 16.4+ 的 Web Push 只对"以独立
         模式从主屏幕启动"的 Web App 开放：没有这份 manifest 时，加到主屏幕的
         图标只是个 Safari 书签，打开后 Notification/PushManager 根本不存在，
         通知永远不可能出现。Android 端有了它才是可安装的真 PWA。
         PWA manifest (display: standalone). iOS 16.4+ only exposes Web Push to
         web apps launched standalone from the Home Screen: without this
         manifest the home-screen icon is just a Safari bookmark where
         Notification/PushManager don't exist at all. It also makes the app a
         real installable PWA on Android. -->
    <link rel="manifest" href="/manifest.webmanifest" />
    <meta name="theme-color" content="#06030f" />
    <!-- iOS 主屏幕 Web App 声明与图标（iOS 不读 manifest 的 icons，只认
         apple-touch-icon）/ iOS home-screen web-app declaration & icon (iOS
         ignores manifest icons; only apple-touch-icon is honored) -->
    <meta name="mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="apple-mobile-web-app-title" content="Signal Lab" />
    <link rel="apple-touch-icon" href="/icons/apple-touch-icon.png" />
    <title>Signal Lab · 信号实验室 · by PRISMX</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Orbitron:wght@500;700;900&family=Sora:wght@300;400;500;600;700&family=Space+Grotesk:wght@500;600;700&family=JetBrains+Mono:wght@400;500;600;700&display=swap"
      rel="stylesheet"
    />
    <!-- Google Identity Services / Google 登录 SDK -->
    <script src="https://accounts.google.com/gsi/client" async defer></script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
